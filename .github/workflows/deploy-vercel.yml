name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Basic sanity checks (no secret leakage)
      - name: Validate Vercel Secrets
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "❌ ERROR: VERCEL_TOKEN secret is not configured!"
            missing=1
          fi

          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then
            echo "❌ ERROR: VERCEL_ORG_ID secret is not configured!"
            echo "   (Use your Vercel Team ID, e.g. team_xxxxx)"
            missing=1
          fi

          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "❌ ERROR: VERCEL_PROJECT_ID secret is not configured!"
            echo "   (Find it in Vercel Project Settings → General)"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Fix: GitHub repo → Settings → Secrets and variables → Actions"
            echo "Add: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID"
            exit 1
          fi

          echo "✅ All required Vercel secrets are configured"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Pin the CLI version for reproducibility
      - name: Install Vercel CLI
        run: npm install -g vercel@50.15.1

      # Pull env vars into .vercel (non-interactive)
      - name: Pull Vercel Environment Information
        run: |
          vercel pull --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --project=${{ secrets.VERCEL_PROJECT_ID }}

      # Build locally on the runner (so deploy can be --prebuilt)
      - name: Build Project Artifacts
        run: |
          vercel build --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --project=${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        run: |
          vercel deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --project=${{ secrets.VERCEL_PROJECT_ID }}

